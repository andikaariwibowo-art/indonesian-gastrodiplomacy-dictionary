<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesian Restaurants — Netherlands & France</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--cream:#F7F2E8;--parchment:#EDE4D0;--warm-white:#FDFAF4;--ink:#1A1208;--ink-mid:#3D2B0F;--ink-light:#6B4F2A;--spice:#B5451B;--gold:#C49A2A;--gold-light:#E2B84A;--clove:#5C3317;--shadow:rgba(90,50,10,0.12);--nl:#1A6B8A;--fr:#8A1A4A;}
  *{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;}
  body{font-family:'Source Serif 4',Georgia,serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;}

  /* HEADER */
  #hdr{background:var(--clove);color:var(--cream);padding:0.9rem 1.5rem;border-bottom:4px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.6rem;flex-shrink:0;}
  .back{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;color:var(--gold-light);text-decoration:none;border:1px solid rgba(226,184,74,0.4);padding:0.28rem 0.7rem;border-radius:2px;}
  .back:hover{background:rgba(226,184,74,0.1);}
  .htitle{font-family:'Playfair Display',serif;font-size:clamp(0.9rem,2vw,1.2rem);font-weight:700;color:var(--cream);line-height:1.2;}
  .htitle span{display:block;font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-light);font-weight:400;margin-bottom:0.1rem;}
  .hsource{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:rgba(226,184,74,0.7);background:rgba(255,255,255,0.06);padding:0.22rem 0.65rem;border-radius:2px;border:1px solid rgba(226,184,74,0.2);}

  /* FILTER BAR */
  #ctrl{background:var(--warm-white);border-bottom:1.5px solid var(--parchment);padding:0.55rem 1.5rem;display:flex;align-items:center;gap:0.55rem;flex-wrap:wrap;flex-shrink:0;box-shadow:0 2px 8px var(--shadow);}
  .clabel{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);flex-shrink:0;}
  /* Country buttons */
  .country-btn{font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;padding:0.3rem 0.9rem;border-radius:20px;border:2px solid;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:0.35rem;}
  .country-btn[data-country="all"]{border-color:var(--parchment);background:var(--warm-white);color:var(--ink-mid);}
  .country-btn[data-country="all"].active{background:var(--clove);color:var(--cream);border-color:var(--clove);}
  .country-btn[data-country="Netherlands"]{border-color:var(--nl);color:var(--nl);background:var(--warm-white);}
  .country-btn[data-country="Netherlands"].active{background:var(--nl);color:#fff;}
  .country-btn[data-country="France"]{border-color:var(--fr);color:var(--fr);background:var(--warm-white);}
  .country-btn[data-country="France"].active{background:var(--fr);color:#fff;}
  /* City buttons */
  #city-row{display:flex;align-items:center;gap:0.45rem;flex-wrap:wrap;}
  .city-btn{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.05em;padding:0.22rem 0.65rem;border-radius:16px;border:1.5px solid var(--parchment);background:var(--warm-white);color:var(--ink-mid);cursor:pointer;transition:all 0.15s;}
  .city-btn:hover{border-color:var(--gold);color:#7A6010;}
  .city-btn.active-nl{background:var(--nl);color:#fff;border-color:var(--nl);}
  .city-btn.active-fr{background:var(--fr);color:#fff;border-color:var(--fr);}
  /* Type filter */
  .fbtn{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.05em;padding:0.22rem 0.65rem;border-radius:16px;border:1.5px solid var(--parchment);background:var(--warm-white);color:var(--ink-mid);cursor:pointer;transition:all 0.15s;}
  .fbtn:hover{border-color:var(--spice);color:var(--spice);}
  .fbtn.active{background:var(--spice);color:var(--cream);border-color:var(--spice);}
  .sep{width:1px;height:16px;background:var(--parchment);flex-shrink:0;}
  .spill{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--ink-light);display:flex;align-items:center;gap:0.3rem;margin-left:auto;}
  .spill strong{font-size:0.82rem;color:var(--spice);font-weight:700;}

  /* LAYOUT */
  #wrap{display:flex;flex:1;overflow:hidden;}
  #map{flex:1;min-height:420px;z-index:1;}
  #panel{width:295px;background:var(--warm-white);border-left:2px solid var(--parchment);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
  .phdr{padding:0.9rem 1.1rem 0.7rem;border-bottom:1px solid var(--parchment);background:var(--cream);flex-shrink:0;}
  .phdr h3{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;color:var(--clove);margin-bottom:0.1rem;}
  .phdr p{font-size:0.68rem;color:var(--ink-light);font-style:italic;}
  #rlist{flex:1;overflow-y:auto;}

  /* Country section header */
  .country-hdr{padding:0.32rem 1.1rem;font-family:'JetBrains Mono',monospace;font-size:0.56rem;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--parchment);}
  .country-hdr.nl{background:rgba(26,107,138,0.08);color:var(--nl);}
  .country-hdr.fr{background:rgba(138,26,74,0.08);color:var(--fr);}
  /* City section header */
  .city-hdr{padding:0.28rem 1.1rem;font-family:'JetBrains Mono',monospace;font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);border-bottom:1px solid var(--parchment);background:var(--cream);}

  /* Restaurant item */
  .ri{padding:0.6rem 1.1rem;border-bottom:1px solid var(--parchment);cursor:pointer;transition:background 0.12s;display:flex;gap:0.55rem;align-items:flex-start;}
  .ri:hover{background:rgba(181,69,27,0.04);}
  .ri.active{background:rgba(181,69,27,0.08);border-left:3px solid var(--spice);padding-left:calc(1.1rem - 3px);}
  .rnk{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--parchment);flex-shrink:0;min-width:18px;line-height:1.4;}
  .ri.active .rnk,.ri:hover .rnk{color:var(--spice);}
  .rinfo{flex:1;min-width:0;}
  .rname{font-family:'Playfair Display',serif;font-size:0.8rem;font-weight:700;color:var(--clove);margin-bottom:0.15rem;line-height:1.2;}
  .rmeta{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
  .rrat{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:#B5451B;font-weight:500;}
  .rrev{font-family:'JetBrains Mono',monospace;font-size:0.54rem;color:var(--ink-light);}
  .rtype{font-family:'JetBrains Mono',monospace;font-size:0.48rem;letter-spacing:0.04em;padding:0.09rem 0.38rem;border-radius:2px;display:inline-block;}

  /* Detail card */
  #dc{display:none;padding:1rem 1.1rem;border-top:2px solid var(--parchment);background:var(--cream);flex-shrink:0;}
  #dc.visible{display:block;}
  .dn{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--clove);margin-bottom:0.1rem;}
  .dr{font-family:'JetBrains Mono',monospace;font-size:0.56rem;letter-spacing:0.08em;color:var(--ink-light);margin-bottom:0.4rem;}
  .dsl{font-family:'JetBrains Mono',monospace;font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-light);margin-bottom:0.2rem;margin-top:0.6rem;}
  .ddesc{font-size:0.74rem;line-height:1.56;color:var(--ink-mid);font-weight:300;}
  .dmenu{font-size:0.72rem;color:var(--ink-mid);background:rgba(237,228,208,0.5);padding:0.38rem 0.6rem;border-left:2px solid var(--gold);font-style:italic;}
  .dcls{float:right;font-size:1.1rem;color:var(--ink-light);cursor:pointer;padding:0 0 0.3rem 0.5rem;}
  .dcls:hover{color:var(--spice);}
  .dlink{display:inline-block;margin-top:0.6rem;font-family:'JetBrains Mono',monospace;font-size:0.54rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--spice);text-decoration:none;border-bottom:1px dotted var(--spice);}

  /* Legend */
  #leg{padding:0.5rem 1.1rem;border-top:1px solid var(--parchment);background:var(--warm-white);display:flex;gap:1rem;flex-wrap:wrap;flex-shrink:0;}
  .li{display:flex;align-items:center;gap:0.3rem;font-family:'JetBrains Mono',monospace;font-size:0.54rem;color:var(--ink-light);}
  .ld{width:8px;height:8px;border-radius:50%;}

  /* Leaflet popup */
  .leaflet-popup-content-wrapper{border-radius:4px!important;box-shadow:0 4px 18px rgba(26,18,8,0.18)!important;font-family:'Source Serif 4',Georgia,serif!important;}
  .leaflet-popup-content{margin:11px 13px!important;}
  .pc{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6B4F2A;margin-bottom:2px;}
  .pn{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#5C3317;margin-bottom:3px;}
  .ps{font-size:11px;margin-bottom:4px;}
  .pb{font-size:9px;padding:2px 6px;border-radius:2px;display:inline-block;margin-bottom:5px;}
  .pd{font-size:11px;color:#3D2B0F;line-height:1.5;font-weight:300;}

  @media(max-width:720px){#wrap{flex-direction:column;}#panel{width:100%;border-left:none;border-top:2px solid var(--parchment);max-height:240px;}#map{min-height:300px;}}
</style>
</head>

// ── COLOUR SCHEME ─────────────────────────────────────────────────────────────
var TC = {traditional:'#B5451B', modern:'#C49A2A'};
var TL = {traditional:'Traditional', modern:'Modern/Fusion'};
var TB = {traditional:'rgba(181,69,27,0.1)', modern:'rgba(196,154,42,0.12)'};
var CC = {Netherlands:'#1A6B8A', France:'#8A1A4A'};

var activeCountry='all', activeCity='all', activeType='all';
var map, MM={};

// ── FILTER LOGIC ──────────────────────────────────────────────────────────────
function visibleData(){
  return ALL.filter(function(p){
    var cOk = activeCountry==='all' || p.country===activeCountry;
    var cityOk = activeCity==='all' || p.city===activeCity;
    var tOk = activeType==='all' || p.type===activeType;
    return cOk && cityOk && tOk;
  });
}

// ── CITY ROW ──────────────────────────────────────────────────────────────────
function rebuildCityRow(){
  var row = document.getElementById('city-row');
  row.innerHTML='';
  var cities = [];
  if(activeCountry==='all'){
    cities = ['All Cities'];
  } else if(activeCountry==='Netherlands'){
    cities = ['All Cities'].concat(CITIES_NL);
  } else {
    cities = ['All Cities'].concat(CITIES_FR);
  }
  cities.forEach(function(c){
    var btn = document.createElement('button');
    btn.className='city-btn';
    btn.textContent = c;
    btn.dataset.city = (c==='All Cities') ? 'all' : c;
    var ac = (activeCity==='all' && c==='All Cities') || activeCity===c;
    if(ac){
      btn.classList.add(activeCountry==='France' ? 'active-fr' : 'active-nl');
    }
    btn.addEventListener('click', function(){
      activeCity = btn.dataset.city;
      if(activeCity!=='all'){
        var pts = ALL.filter(function(p){return p.city===activeCity;});
        if(pts.length){
          var g = L.latLngBounds(pts.map(function(p){return[p.lat,p.lng];}));
          map.fitBounds(g,{padding:[50,50]});
        }
      } else if(activeCountry!=='all'){
        var pts2 = ALL.filter(function(p){return p.country===activeCountry;});
        if(pts2.length){
          var g2 = L.latLngBounds(pts2.map(function(p){return[p.lat,p.lng];}));
          map.fitBounds(g2,{padding:[60,60]});
        }
      } else {
        map.setView([50,3],5);
      }
      rebuildCityRow();
      render();
    });
    row.appendChild(btn);
  });
}

// ── MAP ICON ──────────────────────────────────────────────────────────────────
function stH(r){
  var s='';for(var i=0;i<Math.floor(r);i++)s+='&#9733;';
  return '<span style="color:#C49A2A">'+s+'</span> <span style="color:#6B4F2A;font-size:0.9em">'+r.toFixed(1)+'</span>';
}

function mkIcon(p, faded){
  var c = faded ? '#ccc' : TC[p.type];
  var bc = faded ? '#bbb' : CC[p.country];
  var op = faded ? '0.2' : '1';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="40" viewBox="0 0 30 40">'
    +'<path d="M15 0C6.72 0 0 6.72 0 15c0 10 15 25 15 25S30 25 30 15C30 6.72 23.28 0 15 0z" fill="'+bc+'" opacity="'+op+'"/>'
    +'<circle cx="15" cy="15" r="7.5" fill="white" opacity="'+op+'"/>'
    +'<text x="15" y="19.5" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="bold" fill="'+c+'" opacity="'+op+'">'+p.rank+'</text>'
    +'</svg>';
  return L.divIcon({html:svg, className:'', iconSize:[30,40], iconAnchor:[15,40], popupAnchor:[0,-42]});
}

// ── INIT MAP ──────────────────────────────────────────────────────────────────
function initMap(){
  map = L.map('map',{zoomControl:true}).setView([50,3],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:18
  }).addTo(map);
  ALL.forEach(function(p){
    var m = L.marker([p.lat,p.lng],{icon:mkIcon(p,false)}).addTo(map);
    m.bindPopup(
      '<div class="pc">'+p.country+' &middot; '+p.city+' &middot; Rank #'+p.rank+' &middot; '+TL[p.type]+'</div>'
      +'<div class="pn">'+p.name+'</div>'
      +'<div class="ps">'+stH(p.rating)+' <span style="color:#6B4F2A;font-size:10px;">('+p.reviews.toLocaleString()+' reviews)</span></div>'
      +'<span class="pb" style="background:'+TB[p.type]+';color:'+TC[p.type]+'">'+TL[p.type]+'</span>'
      +'<div class="pd">'+p.desc+'</div>',
      {maxWidth:270}
    );
    m.on('click',function(){showDetail(p);hlItem(p.id);});
    MM[p.id]=m;
  });
  rebuildCityRow();
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var vis = visibleData();
  ALL.forEach(function(p){
    var show = vis.indexOf(p)!==-1;
    MM[p.id].setIcon(mkIcon(p,!show));
    MM[p.id].setZIndexOffset(show ? 0 : -1000);
  });
  document.getElementById('sc').textContent = vis.length;

  var list = document.getElementById('rlist');
  list.innerHTML='';

  // Group by country then city
  var countries = [];
  var bycountry = {};
  vis.forEach(function(p){
    if(!bycountry[p.country]){bycountry[p.country]={};countries.push(p.country);}
    if(!bycountry[p.country][p.city]) bycountry[p.country][p.city]=[];
    bycountry[p.country][p.city].push(p);
  });

  countries.forEach(function(country){
    // Country header
    var ch = document.createElement('div');
    ch.className = 'country-hdr ' + (country==='Netherlands' ? 'nl' : 'fr');
    ch.innerHTML = (country==='Netherlands' ? '🇳🇱 ' : '🇫🇷 ') + country.toUpperCase();
    list.appendChild(ch);

    var bycity = bycountry[country];
    Object.keys(bycity).forEach(function(city){
      // City header
      var cityHdr = document.createElement('div');
      cityHdr.className='city-hdr';
      cityHdr.textContent = city;
      list.appendChild(cityHdr);

      bycity[city].forEach(function(p){
        var item = document.createElement('div');
        item.className='ri'; item.dataset.id=p.id;
        item.innerHTML = '<div class="rnk">#'+p.rank+'</div>'
          +'<div class="rinfo"><div class="rname">'+p.name+'</div>'
          +'<div class="rmeta"><span class="rrat">&#9733; '+p.rating.toFixed(1)+'</span>'
          +'<span class="rrev">('+p.reviews.toLocaleString()+')</span>'
          +'<span class="rtype" style="background:'+TB[p.type]+';color:'+TC[p.type]+'">'+TL[p.type]+'</span></div></div>';
        item.addEventListener('click',function(){
          map.setView([p.lat,p.lng],15,{animate:true});
          MM[p.id].openPopup();
          showDetail(p);hlItem(p.id);
        });
        list.appendChild(item);
      });
    });
  });

  document.getElementById('dc').classList.remove('visible');
}

function hlItem(id){
  document.querySelectorAll('.ri').forEach(function(el){el.classList.toggle('active',parseInt(el.dataset.id)===id);});
  var a = document.querySelector('.ri[data-id="'+id+'"]');
  if(a) a.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showDetail(p){
  var card = document.getElementById('dc');
  card.innerHTML = '<span class="dcls" id="cdc">&times;</span>'
    +'<div class="dn">'+p.name+'</div>'
    +'<div class="dr">'+p.country+' — '+p.city+' &mdash; Rank #'+p.rank+' &middot; '+TL[p.type]+'</div>'
    +'<div style="margin-bottom:0.4rem">'+stH(p.rating)+' <span style="color:var(--ink-light);font-size:0.74rem;">('+p.reviews.toLocaleString()+' reviews)</span></div>'
    +'<div class="dsl">Description</div><div class="ddesc">'+p.desc+'</div>'
    +'<div class="dsl">Signature Dishes</div><div class="dmenu">'+p.menu+'</div>'
    +'<a class="dlink" href="'+p.url+'" target="_blank">View on TripAdvisor &#8599;</a>';
  card.classList.add('visible');
  document.getElementById('cdc').addEventListener('click',function(){
    card.classList.remove('visible');
    document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('active');});
  });
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────────
document.querySelectorAll('.country-btn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.country-btn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    activeCountry = b.dataset.country;
    activeCity = 'all';
    if(activeCountry==='Netherlands'){
      var pts = ALL.filter(function(p){return p.country==='Netherlands';});
      var g = L.latLngBounds(pts.map(function(p){return[p.lat,p.lng];}));
      map.fitBounds(g,{padding:[60,60]});
    } else if(activeCountry==='France'){
      var pts2 = ALL.filter(function(p){return p.country==='France';});
      var g2 = L.latLngBounds(pts2.map(function(p){return[p.lat,p.lng];}));
      map.fitBounds(g2,{padding:[60,60]});
    } else {
      map.setView([50,3],5);
    }
    rebuildCityRow();
    render();
  });
});

document.querySelectorAll('.fbtn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.fbtn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    activeType = b.dataset.filter;
    render();
  });
});

window.addEventListener('load', initMap);
</script>
</body>
</html>
