   desc:'Authentic and well-reviewed Indonesian restaurant in Leiden. Reviewers consistently describe the food as genuinely Indonesian — popular with both locals and Leiden University students.',
   menu:'Sumatran dishes, rijsttafel, nasi goreng, rendang',
   url:'https://www.tripadvisor.co.id/Restaurant_Review-g188630-d2109309-Reviews-Sumatra_House-Leiden_South_Holland_Province.html'},

   desc:'Small Indonesian toko and takeaway restaurant in central Leiden. Known for quick, affordable Indonesian food, popular among local residents and students.',
   menu:'Indonesian daily dishes, nasi goreng, takeaway specials',
   url:'https://www.tripadvisor.co.id/Restaurant_Review-g188630-d11732202-Reviews-BungaMas-Leiden_South_Holland_Province.html'}
];

var TC={traditional:'#B5451B',modern:'#C49A2A'};
var TL={traditional:'Traditional',modern:'Modern / Fusion'};
var TB={traditional:'rgba(181,69,27,0.1)',modern:'rgba(196,154,42,0.12)'};
var activeCity='all',activeType='all',map,MM={};

function stH(r){var s='';for(var i=0;i<Math.floor(r);i++)s+='&#9733;';return '<span style="color:#C49A2A">'+s+'</span> <span style="color:#6B4F2A;font-size:0.9em">'+r.toFixed(1)+'</span>';}

function mkIcon(p,faded){
  var c=faded?'#ccc':TC[p.type],op=faded?'0.25':'1';
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="30" height="40" viewBox="0 0 30 40">'
    +'<path d="M15 0C6.72 0 0 6.72 0 15c0 10 15 25 15 25S30 25 30 15C30 6.72 23.28 0 15 0z" fill="'+c+'" opacity="'+op+'"/>'
    +'<circle cx="15" cy="15" r="8" fill="white" opacity="'+op+'"/>'
    +'<text x="15" y="19" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="'+c+'" opacity="'+op+'">'+p.rank+'</text>'
    +'</svg>';
  return L.divIcon({html:svg,className:'',iconSize:[30,40],iconAnchor:[15,40],popupAnchor:[0,-42]});
}

function visible(){
  return ALL.filter(function(p){
    return (activeCity==='all'||p.city===activeCity)&&(activeType==='all'||p.type===activeType);
  });
}

function initMap(){
  map=L.map('map',{zoomControl:true}).setView([52.1,4.7],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:18
  }).addTo(map);
  ALL.forEach(function(p){
    var m=L.marker([p.lat,p.lng],{icon:mkIcon(p,false)}).addTo(map);
    m.bindPopup(
      '<div class="pc">'+p.city+' &middot; Rank #'+p.rank+' &middot; '+TL[p.type]+'</div>'
      +'<div class="pn">'+p.name+'</div>'
      +'<div class="ps">'+stH(p.rating)+' <span style="color:#6B4F2A;font-size:10px;">('+p.reviews.toLocaleString()+' reviews)</span></div>'
      +'<span class="pb" style="background:'+TB[p.type]+';color:'+TC[p.type]+'">'+TL[p.type]+'</span>'
      +'<div class="pd">'+p.desc+'</div>',
      {maxWidth:260}
    );
    m.on('click',function(){showDetail(p);hlItem(p.id);});
    MM[p.id]=m;
  });
  render();
}

function render(){
  var vis=visible();
  ALL.forEach(function(p){
    var show=vis.indexOf(p)!==-1;
    MM[p.id].setIcon(mkIcon(p,!show));
    MM[p.id].setZIndexOffset(show?0:-1000);
  });
  document.getElementById('sc').textContent=vis.length;
  var list=document.getElementById('rlist');
  list.innerHTML='';
  var cities=[];
  vis.forEach(function(p){if(cities.indexOf(p.city)===-1)cities.push(p.city);});
  cities.forEach(function(city){
    var hdr=document.createElement('div');
    hdr.style.cssText='padding:0.4rem 1.1rem;background:'+CITY_COLORS[city]+'15;border-bottom:1px solid var(--parchment);font-family:JetBrains Mono,monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:'+CITY_COLORS[city]+';font-weight:500;';
    hdr.textContent=city;
    list.appendChild(hdr);
    vis.filter(function(p){return p.city===city;}).forEach(function(p){
      var item=document.createElement('div');
      item.className='ri';item.dataset.id=p.id;
      item.innerHTML='<div class="rnk">#'+p.rank+'</div>'
        +'<div class="rinfo"><div class="rname">'+p.name+'</div>'
        +'<div class="rmeta"><span class="rrat">&#9733; '+p.rating.toFixed(1)+'</span>'
        +'<span class="rrev">('+p.reviews.toLocaleString()+')</span>'
        +'<span class="rtype" style="background:'+TB[p.type]+';color:'+TC[p.type]+'">'+TL[p.type]+'</span></div></div>';
      item.addEventListener('click',function(){
        map.setView([p.lat,p.lng],15,{animate:true});
        MM[p.id].openPopup();showDetail(p);hlItem(p.id);
      });
      list.appendChild(item);
    });
  });
  document.getElementById('dc').classList.remove('visible');
}

function hlItem(id){
  document.querySelectorAll('.ri').forEach(function(el){el.classList.toggle('active',parseInt(el.dataset.id)===id);});
  var a=document.querySelector('.ri[data-id="'+id+'"]');
  if(a)a.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showDetail(p){
  var card=document.getElementById('dc');
  card.innerHTML='<span class="dcls" id="cdc">&times;</span>'
    +'<div class="dn">'+p.name+'</div>'
    +'<div class="dr">'+p.city+' &mdash; Rank #'+p.rank+' &middot; '+TL[p.type]+'</div>'
    +'<div style="margin-bottom:0.45rem">'+stH(p.rating)+' <span style="color:var(--ink-light);font-size:0.76rem;">('+p.reviews.toLocaleString()+' reviews)</span></div>'
    +'<div class="dsl">Description</div><div class="ddesc">'+p.desc+'</div>'
    +'<div class="dsl">Signature Dishes</div><div class="dmenu">'+p.menu+'</div>'
    +'<a class="dlink" href="'+p.url+'" target="_blank">View on TripAdvisor &#8599;</a>';
  card.classList.add('visible');
  document.getElementById('cdc').addEventListener('click',function(){
    card.classList.remove('visible');
    document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('active');});
  });
}

document.querySelectorAll('.cbtn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.cbtn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');activeCity=b.dataset.city;
    if(activeCity!=='all'){
      var pts=ALL.filter(function(p){return p.city===activeCity;});
      if(pts.length){var g=L.latLngBounds(pts.map(function(p){return[p.lat,p.lng];}));map.fitBounds(g,{padding:[50,50]});}
    }else{map.setView([52.1,4.7],8);}
    render();
  });
});

document.querySelectorAll('.fbtn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.fbtn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');activeType=b.dataset.filter;render();
  });
});

window.addEventListener('load',initMap);
</script>
</body>
